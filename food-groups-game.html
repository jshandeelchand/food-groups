<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plate It Right! 🍽️</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF7E6;
    --fruit:#FF6B5E;
    --veg:#3FA66B;
    --grain:#E8A93B;
    --protein:#B25CC9;
    --dairy:#4FB3E8;
    --ink:#3A2E1F;
    --card-bg:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    font-family:'Nunito',sans-serif;
    background:
      radial-gradient(circle at 15% 10%, #FFEFC4 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, #FFE0D6 0%, transparent 45%),
      var(--cream);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  h1{
    font-family:'Baloo 2',cursive;
    text-align:center;
    font-size:clamp(28px,5vw,44px);
    margin:18px 0 4px;
    color:#E8622F;
    text-shadow:2px 2px 0 #fff, 4px 4px 0 rgba(0,0,0,0.06);
  }
  .subtitle{
    text-align:center;
    font-weight:700;
    color:#8a7358;
    margin-bottom:10px;
    font-size:15px;
  }
  .scoreboard{
    display:flex;
    justify-content:center;
    gap:14px;
    align-items:center;
    margin-bottom:14px;
  }
  .score-pill{
    background:#fff;
    border-radius:999px;
    padding:8px 18px;
    font-family:'Baloo 2',cursive;
    font-weight:700;
    font-size:16px;
    box-shadow:0 3px 0 rgba(0,0,0,0.08);
    border:2px solid #ffd7a3;
  }
  .reset-btn{
    background:var(--fruit);
    color:#fff;
    border:none;
    border-radius:999px;
    padding:8px 18px;
    font-family:'Baloo 2',cursive;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    box-shadow:0 3px 0 #c9453b;
  }
  .reset-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #c9453b;}

  .game-wrap{
    max-width:1000px;
    margin:0 auto;
    padding:0 16px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
  }

  /* ---------- PLATE ---------- */
  .plate-area{
    position:relative;
    display:flex;
    align-items:flex-end;
    gap:22px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .plate-ring{
    width:min(78vw,360px);
    height:min(78vw,360px);
    border-radius:50%;
    background:#fff;
    padding:14px;
    box-shadow:0 10px 0 #e9dcc3, 0 14px 24px rgba(0,0,0,0.12);
    position:relative;
  }
  .plate-inner{
    width:100%;
    height:100%;
    border-radius:50%;
    overflow:hidden;
    position:relative;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    box-shadow:inset 0 0 0 3px #fff, inset 0 4px 12px rgba(0,0,0,0.12);
  }
  .quad{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:filter .15s ease, transform .15s ease;
  }
  .quad-label{
    font-family:'Baloo 2',cursive;
    font-weight:700;
    color:rgba(255,255,255,0.95);
    text-align:center;
    text-shadow:0 2px 3px rgba(0,0,0,0.2);
    font-size:clamp(12px,2.4vw,16px);
    pointer-events:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
  }
  .quad-label .icon{font-size:clamp(20px,4vw,28px);}
  .quad.veg{background:var(--veg);}
  .quad.fruit{background:var(--fruit);}
  .quad.grain{background:var(--grain);}
  .quad.protein{background:var(--protein);}
  .quad.dragover{filter:brightness(1.18);transform:scale(1.03);}

  .dairy-cup{
    width:min(24vw,110px);
    height:min(24vw,110px);
    border-radius:50%;
    background:var(--dairy);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 0 #3892b8, 0 10px 18px rgba(0,0,0,0.1);
    margin-bottom:10px;
    transition:filter .15s ease, transform .15s ease;
  }
  .dairy-cup.dragover{filter:brightness(1.18);transform:scale(1.05);}
  .dairy-cup .quad-label{font-size:clamp(11px,2vw,14px);}

  /* dropped items placed on plate */
  .placed-item{
    position:absolute;
    font-size:26px;
    animation:pop-settle .45s ease;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,0.25));
  }
  @keyframes pop-settle{
    0%{transform:scale(0.3) translateY(-10px);opacity:0;}
    60%{transform:scale(1.25);opacity:1;}
    100%{transform:scale(1);}
  }

  /* ---------- TRAY ---------- */
  .tray-label{
    font-family:'Baloo 2',cursive;
    font-weight:700;
    color:#8a5a2b;
    font-size:16px;
    margin-bottom:-8px;
  }
  .tray{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    justify-content:center;
    max-width:820px;
    padding:16px;
    background:repeating-linear-gradient(135deg,#fff,#fff 14px,#fbeed9 14px,#fbeed9 28px);
    border-radius:20px;
    box-shadow:inset 0 0 0 3px #f0d9ab;
  }
  .food-card{
    width:74px;
    height:88px;
    background:var(--card-bg);
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-shadow:0 3px 0 #d9c39a, 0 5px 8px rgba(0,0,0,0.08);
    cursor:grab;
    touch-action:none;
    user-select:none;
    transition:transform .12s ease, box-shadow .12s ease, opacity .2s ease;
    position:relative;
  }
  .food-card:active{cursor:grabbing;}
  .food-card .emoji{font-size:34px;line-height:1;}
  .food-card .name{font-size:10.5px;font-weight:700;color:#7a6a52;margin-top:4px;}
  .food-card.dragging{
    position:fixed;
    z-index:500;
    box-shadow:0 12px 20px rgba(0,0,0,0.25);
    transform:scale(1.12) rotate(-4deg);
    pointer-events:none;
  }
  .food-card.placed{
    opacity:0.28;
    pointer-events:none;
    filter:grayscale(0.6);
  }
  .food-card.wobble{animation:wobble .5s ease;}
  @keyframes wobble{
    0%{transform:translateX(0) rotate(0);}
    15%{transform:translateX(-10px) rotate(-8deg);}
    30%{transform:translateX(9px) rotate(7deg);}
    45%{transform:translateX(-7px) rotate(-5deg);}
    60%{transform:translateX(6px) rotate(4deg);}
    75%{transform:translateX(-3px) rotate(-2deg);}
    100%{transform:translateX(0) rotate(0);}
  }

  /* ---------- CHEF ---------- */
  .chef-wrap{
    position:fixed;
    bottom:18px;
    right:18px;
    display:flex;
    align-items:flex-end;
    gap:0;
    z-index:600;
    pointer-events:none;
  }
  .chef{
    font-size:64px;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,0.25));
    transform-origin:bottom center;
  }
  .chef.bounce{animation:chef-bounce .6s ease;}
  .chef.shake{animation:chef-shake .5s ease;}
  @keyframes chef-bounce{
    0%{transform:translateY(0) scale(1);}
    30%{transform:translateY(-18px) scale(1.08);}
    50%{transform:translateY(0) scale(1);}
    70%{transform:translateY(-8px);}
    100%{transform:translateY(0);}
  }
  @keyframes chef-shake{
    0%,100%{transform:rotate(0);}
    20%{transform:rotate(-10deg);}
    40%{transform:rotate(8deg);}
    60%{transform:rotate(-6deg);}
    80%{transform:rotate(4deg);}
  }
  .speech-bubble{
    position:absolute;
    bottom:78px;
    right:60px;
    max-width:220px;
    background:#fff;
    border-radius:18px;
    padding:12px 16px;
    font-family:'Baloo 2',cursive;
    font-weight:700;
    font-size:15px;
    box-shadow:0 6px 14px rgba(0,0,0,0.18);
    opacity:0;
    transform:scale(0.6) translateY(10px);
    transform-origin:bottom right;
    transition:opacity .25s ease, transform .25s ease;
  }
  .speech-bubble.correct{color:#1f8a4c; border:2px solid #b7e8c9;}
  .speech-bubble.wrong{color:#c9432f; border:2px solid #f5c6bd;}
  .speech-bubble::after{
    content:"";
    position:absolute;
    bottom:-10px;
    right:34px;
    width:0;height:0;
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-top:12px solid #fff;
  }
  .speech-bubble.show{
    opacity:1;
    transform:scale(1) translateY(0);
  }

  /* correct check mark burst */
  .check-burst{
    position:fixed;
    z-index:550;
    width:70px;height:70px;
    pointer-events:none;
  }
  .check-burst svg{width:100%;height:100%;}
  .check-circle{
    stroke:#3FA66B;
    fill:#eafff1;
    stroke-width:5;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,0.15));
  }
  .check-mark{
    stroke:#2c8a52;
    stroke-width:6;
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:40;
    stroke-dashoffset:40;
    animation:draw-check .35s ease forwards .15s;
  }
  @keyframes draw-check{ to{stroke-dashoffset:0;} }
  .check-burst-fade{animation:burst-fade .9s ease forwards;}
  @keyframes burst-fade{
    0%{opacity:1;transform:scale(0.5);}
    20%{transform:scale(1.15);}
    35%{transform:scale(1);}
    75%{opacity:1;}
    100%{opacity:0;transform:scale(1.2);}
  }

  .win-banner{
    position:fixed;
    inset:0;
    background:rgba(58,46,31,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:900;
  }
  .win-banner.show{display:flex;}
  .win-card{
    background:#fff;
    border-radius:24px;
    padding:36px 40px;
    text-align:center;
    max-width:340px;
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
  }
  .win-card h2{
    font-family:'Baloo 2',cursive;
    color:#E8622F;
    font-size:26px;
    margin:6px 0;
  }
  .win-card p{font-weight:700;color:#8a7358;margin-bottom:18px;}
  .win-emoji{font-size:52px;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  @media (max-width:480px){
    .chef-wrap{right:8px;bottom:8px;}
    .chef{font-size:48px;}
    .speech-bubble{right:36px;max-width:170px;font-size:13px;padding:10px 12px;}
  }
</style>
</head>
<body>

<h1>Plate It Right! 🍽️</h1>
<div class="subtitle">Drag each food onto the correct food group to help Chef Marco build a balanced plate</div>

<div class="scoreboard">
  <div class="score-pill">✅ <span id="scoreCount">0</span> / <span id="scoreTotal">0</span></div>
  <button class="reset-btn" id="resetBtn">🔄 Restart</button>
</div>

<div class="game-wrap">
  <div class="plate-area">
    <div class="plate-ring">
      <div class="plate-inner">
        <div class="quad veg" data-group="vegetables">
          <div class="quad-label"><span class="icon">🥦</span>Vegetables</div>
        </div>
        <div class="quad fruit" data-group="fruits">
          <div class="quad-label"><span class="icon">🍎</span>Fruits</div>
        </div>
        <div class="quad grain" data-group="grains">
          <div class="quad-label"><span class="icon">🌾</span>Grains</div>
        </div>
        <div class="quad protein" data-group="protein">
          <div class="quad-label"><span class="icon">🍗</span>Protein</div>
        </div>
      </div>
    </div>
    <div class="dairy-cup" data-group="dairy">
      <div class="quad-label"><span class="icon">🥛</span>Dairy</div>
    </div>
  </div>

  <div>
    <div class="tray-label">Food tray — drag an item up to the plate:</div>
    <div class="tray" id="tray"></div>
  </div>
</div>

<div class="chef-wrap">
  <div class="speech-bubble" id="speechBubble"></div>
  <div class="chef" id="chef">👨‍🍳</div>
</div>

<div class="win-banner" id="winBanner">
  <div class="win-card">
    <div class="win-emoji">🎉</div>
    <h2>You did it!</h2>
    <p>Every food found its home. Chef Marco is impressed!</p>
    <button class="reset-btn" id="playAgainBtn">Play Again</button>
  </div>
</div>

<script>
(function(){
  const FOODS = [
    {emoji:"🍎", name:"Apple", group:"fruits"},
    {emoji:"🍌", name:"Banana", group:"fruits"},
    {emoji:"🍇", name:"Grapes", group:"fruits"},
    {emoji:"🍓", name:"Strawberry", group:"fruits"},
    {emoji:"🥦", name:"Broccoli", group:"vegetables"},
    {emoji:"🥕", name:"Carrot", group:"vegetables"},
    {emoji:"🍅", name:"Tomato", group:"vegetables"},
    {emoji:"🌽", name:"Corn", group:"vegetables"},
    {emoji:"🍞", name:"Bread", group:"grains"},
    {emoji:"🍚", name:"Rice", group:"grains"},
    {emoji:"🍝", name:"Pasta", group:"grains"},
    {emoji:"🥐", name:"Croissant", group:"grains"},
    {emoji:"🍗", name:"Chicken", group:"protein"},
    {emoji:"🥚", name:"Egg", group:"protein"},
    {emoji:"🐟", name:"Fish", group:"protein"},
    {emoji:"🥜", name:"Peanuts", group:"protein"},
    {emoji:"🥛", name:"Milk", group:"dairy"},
    {emoji:"🧀", name:"Cheese", group:"dairy"},
    {emoji:"🍦", name:"Yogurt", group:"dairy"}
  ];

  const CORRECT_LINES = [
    "Superb Choice - excellento!",
    "Magnifico! Right on the plate!",
    "Bellissimo! You know your food!",
    "Chef's kiss! Perfecto!"
  ];
  const WRONG_LINES = [
    "Oh no - ho ho ho. Try again buddy!",
    "Whoopsie! Wrong group, little chef!",
    "Not quite! Have another go, friend!",
    "Ho ho, close but no cannoli! Retry!"
  ];

  const tray = document.getElementById('tray');
  const chef = document.getElementById('chef');
  const bubble = document.getElementById('speechBubble');
  const scoreCountEl = document.getElementById('scoreCount');
  const scoreTotalEl = document.getElementById('scoreTotal');
  const winBanner = document.getElementById('winBanner');

  let score = 0;
  let bubbleTimeout = null;

  scoreTotalEl.textContent = FOODS.length;

  // ---- audio (synthesized, no external files) ----
  let audioCtx = null;
  function ctx(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function tone(freq, start, dur, type, gainPeak){
    const ac = ctx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ac.currentTime + start);
    gain.gain.linearRampToValueAtTime(gainPeak, ac.currentTime + start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + start + dur);
    osc.connect(gain).connect(ac.destination);
    osc.start(ac.currentTime + start);
    osc.stop(ac.currentTime + start + dur + 0.05);
  }
  function playDing(){
    tone(880, 0, 0.18, 'sine', 0.25);
    tone(1318.5, 0.08, 0.28, 'sine', 0.22);
    tone(1760, 0.16, 0.35, 'triangle', 0.15);
  }
  function playWomp(){
    tone(220, 0, 0.22, 'sawtooth', 0.12);
    tone(160, 0.12, 0.3, 'sawtooth', 0.12);
  }

  function showBubble(text, kind){
    clearTimeout(bubbleTimeout);
    bubble.textContent = text;
    bubble.className = 'speech-bubble ' + kind;
    // force reflow so re-trigger works even with same class
    void bubble.offsetWidth;
    bubble.classList.add('show');
    chef.classList.remove('bounce','shake');
    void chef.offsetWidth;
    chef.classList.add(kind === 'correct' ? 'bounce' : 'shake');
    bubbleTimeout = setTimeout(()=>{
      bubble.classList.remove('show');
    }, 2400);
  }

  function randomFrom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function checkBurstAt(x, y){
    const wrap = document.createElement('div');
    wrap.className = 'check-burst check-burst-fade';
    wrap.style.left = (x - 35) + 'px';
    wrap.style.top = (y - 35) + 'px';
    wrap.innerHTML = `
      <svg viewBox="0 0 70 70">
        <circle class="check-circle" cx="35" cy="35" r="30"/>
        <path class="check-mark" d="M21 36 L31 46 L50 24"/>
      </svg>`;
    document.body.appendChild(wrap);
    setTimeout(()=>wrap.remove(), 950);
  }

  function placeIconOnGroup(food, targetEl){
    const rect = targetEl.getBoundingClientRect();
    const parentRect = targetEl.closest('.plate-area').getBoundingClientRect();
    const placed = document.createElement('div');
    placed.className = 'placed-item';
    placed.textContent = food.emoji;
    // random-ish position within the target zone, biased toward center
    const offX = (Math.random()-0.5) * rect.width * 0.35;
    const offY = (Math.random()-0.5) * rect.height * 0.35;
    const x = rect.left - parentRect.left + rect.width/2 + offX - 13;
    const y = rect.top - parentRect.top + rect.height/2 + offY - 13;
    document.querySelector('.plate-area').style.position = 'relative';
    placed.style.left = x + 'px';
    placed.style.top = y + 'px';
    document.querySelector('.plate-area').appendChild(placed);
  }

  function buildTray(){
    tray.innerHTML = '';
    FOODS.forEach((food, idx)=>{
      const card = document.createElement('div');
      card.className = 'food-card';
      card.dataset.index = idx;
      card.innerHTML = `<div class="emoji">${food.emoji}</div><div class="name">${food.name}</div>`;
      tray.appendChild(card);
      attachDrag(card, food);
    });
  }

  function attachDrag(card, food){
    let dragging = false;
    let startX, startY, offsetX, offsetY;
    let currentDropZone = null;

    function getDropZones(){
      return Array.from(document.querySelectorAll('.quad, .dairy-cup'));
    }

    function findZoneUnder(clientX, clientY){
      const zones = getDropZones();
      for(const z of zones){
        const r = z.getBoundingClientRect();
        if(clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom){
          return z;
        }
      }
      return null;
    }

    function onPointerDown(e){
      if(card.classList.contains('placed')) return;
      e.preventDefault();
      dragging = true;
      const rect = card.getBoundingClientRect();
      offsetX = (e.clientX ?? e.touches?.[0].clientX) - rect.left;
      offsetY = (e.clientY ?? e.touches?.[0].clientY) - rect.top;
      card.classList.add('dragging');
      card.style.width = rect.width + 'px';
      card.style.height = rect.height + 'px';
      card.style.left = rect.left + 'px';
      card.style.top = rect.top + 'px';
      document.body.appendChild(card); // bring to top layer
      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
    }

    function onPointerMove(e){
      if(!dragging) return;
      const clientX = e.clientX ?? e.touches?.[0].clientX;
      const clientY = e.clientY ?? e.touches?.[0].clientY;
      card.style.left = (clientX - offsetX) + 'px';
      card.style.top = (clientY - offsetY) + 'px';

      const zone = findZoneUnder(clientX, clientY);
      if(currentDropZone && currentDropZone !== zone){
        currentDropZone.classList.remove('dragover');
      }
      if(zone) zone.classList.add('dragover');
      currentDropZone = zone;
    }

    function returnToTray(){
      card.classList.remove('dragging');
      card.style.position = '';
      card.style.left = '';
      card.style.top = '';
      card.style.width = '';
      card.style.height = '';
      // re-insert into tray at original index position
      const cards = Array.from(tray.children);
      const idx = parseInt(card.dataset.index);
      let inserted = false;
      for(const c of cards){
        if(parseInt(c.dataset.index) > idx){
          tray.insertBefore(card, c);
          inserted = true;
          break;
        }
      }
      if(!inserted) tray.appendChild(card);
    }

    function onPointerUp(e){
      if(!dragging) return;
      dragging = false;
      window.removeEventListener('pointermove', onPointerMove);
      window.removeEventListener('pointerup', onPointerUp);

      if(currentDropZone) currentDropZone.classList.remove('dragover');

      const clientX = e.clientX ?? e.changedTouches?.[0].clientX;
      const clientY = e.clientY ?? e.changedTouches?.[0].clientY;
      const zone = findZoneUnder(clientX, clientY);

      if(zone){
        const targetGroup = zone.dataset.group;
        if(targetGroup === food.group){
          // correct!
          playDing();
          showBubble(randomFrom(CORRECT_LINES), 'correct');
          checkBurstAt(clientX, clientY);
          card.classList.add('placed');
          returnToTray();
          placeIconOnGroup(food, zone);
          score++;
          scoreCountEl.textContent = score;
          if(score === FOODS.length){
            setTimeout(()=> winBanner.classList.add('show'), 700);
          }
        } else {
          // wrong
          playWomp();
          showBubble(randomFrom(WRONG_LINES), 'wrong');
          returnToTray();
          card.classList.add('wobble');
          setTimeout(()=>card.classList.remove('wobble'), 550);
        }
      } else {
        // dropped nowhere valid - just snap back
        returnToTray();
      }
      currentDropZone = null;
    }

    card.addEventListener('pointerdown', onPointerDown);
  }

  document.getElementById('resetBtn').addEventListener('click', resetGame);
  document.getElementById('playAgainBtn').addEventListener('click', resetGame);

  function resetGame(){
    score = 0;
    scoreCountEl.textContent = 0;
    winBanner.classList.remove('show');
    document.querySelectorAll('.placed-item').forEach(el=>el.remove());
    // shuffle food order a little each time for replay variety
    FOODS.sort(()=>Math.random()-0.5);
    buildTray();
  }

  buildTray();
})();
</script>

</body>
